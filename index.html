<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1000 Words</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 700px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        p {
            font-size: 1.2rem;
            line-height: 2;
            color: #ccc;
            margin-bottom: 1.5rem;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: #333;
            margin: 3rem auto;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>1000 Words</h1>
        <div class="divider"></div>
        <p>1000 words were never going to be enough.</p>
        <p>Some stories don't end the way we hoped.</p>
        <p>Thank you for being part of mine.</p>
        <p>I Love You, Forever Mi Cielo.</p>
    </div>
</body>
</html>
